<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice the year</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Header mit Titel und Untertitel -->
    <header class="hero">
      <h1 class="hero-title">Ice the year</h1>
      <p class="hero-subtitle">Cold quotes. Sharp memory.</p>
    </header>
    <main class="page">
      <!-- Hauptbereich mit Memory und Leaderboard -->
      <section class="game-layout">
        <!-- Memory-Spielfeld -->
        <!-- Memory-Spielfeld -->
        <section class="memory" aria-label="Memory-Spiel">
          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>

          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>

          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>

          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>
          <button class="memory-card memory-card--white" type="button"></button>
          <button class="memory-card memory-card--black" type="button"></button>
        </section>

        <!-- Leaderboard -->
        <aside class="leaderboard" aria-label="Leaderboard">
          <ol class="leaderboard-list">
            <li class="leaderboard-item leaderboard-item--active">
              <span class="leaderboard-rank">1</span>
              <span class="leaderboard-name">YOU</span>
              <span class="leaderboard-score">0</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">2</span>
              <span class="leaderboard-name">HAM</span>
              <span class="leaderboard-score">+22</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">3</span>
              <span class="leaderboard-name">LEC</span>
              <span class="leaderboard-score">+26</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">4</span>
              <span class="leaderboard-name">ROS</span>
              <span class="leaderboard-score">+30</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">5</span>
              <span class="leaderboard-name">VET</span>
              <span class="leaderboard-score">+34</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">6</span>
              <span class="leaderboard-name">HUL</span>
              <span class="leaderboard-score">+38</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">7</span>
              <span class="leaderboard-name">MAS</span>
              <span class="leaderboard-score">+42</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">8</span>
              <span class="leaderboard-name">VER</span>
              <span class="leaderboard-score">+46</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">9</span>
              <span class="leaderboard-name">ALO</span>
              <span class="leaderboard-score">+50</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">10</span>
              <span class="leaderboard-name">GRO</span>
              <span class="leaderboard-score">+54</span>
            </li>

            <li class="leaderboard-item">
              <span class="leaderboard-rank">11</span>
              <span class="leaderboard-name">MAG</span>
              <span class="leaderboard-score">OUT</span>
            </li>
          </ol>
        </aside>
      </section>

      <section class="instructions">
        <!-- Spielanleitung -->
      </section>
    </main>
    <footer>
      <p>This is the footer of the page.</p>
    </footer>

    <script src="js/script.js" type="module"></script>
  </body>
</html>
